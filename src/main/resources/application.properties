spring.application.name=rbpo-backend

# PostgreSQL (дефолт — та же БД, что в docker-compose: порт 5434 с хоста, rbpo/rbpo)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/rbpodb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${SERVER_PORT:8081}

# TLS/SSL (HTTPS)
server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store=${SSL_KEYSTORE:classpath:keystore.jks}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:changeit}
server.ssl.key-store-type=JKS
server.ssl.key-alias=${SSL_KEY_ALIAS:rbposerver}
server.ssl.key-password=${SSL_KEY_PASSWORD:changeit}
server.ssl.protocol=TLS
server.ssl.enabled-protocols=TLSv1.2,TLSv1.3

server.error.whitelabel.enabled=false
server.error.include-message=always
server.error.include-binding-errors=always

# JWT
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidationMustBeAtLeast256BitsLong}
jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# License ticket signature (SHA256withRSA, RFC 8785)
license.ticket-ttl-seconds=${LICENSE_TICKET_TTL:3600}

# Signature module key store for ticket signing
signature.key-store-path=${SIGNING_KEYSTORE_PATH:classpath:signing.jks}
signature.key-store-type=${SIGNING_KEYSTORE_TYPE:JKS}
signature.key-store-password=${SIGNING_KEYSTORE_PASSWORD:changeit}
signature.key-alias=${SIGNING_KEY_ALIAS:app-signing}
signature.key-password=${SIGNING_KEY_PASSWORD:}

# MinIO (файлы сигнатур; доступ приложения — отдельный ключ rbpoapp из docker/minio-init.sh)
minio.endpoint=${MINIO_ENDPOINT:http://127.0.0.1:9000}
minio.access-key=${MINIO_ACCESS_KEY:rbpoapp}
minio.secret-key=${MINIO_SECRET_KEY:rbpoappsecret}
minio.bucket=${MINIO_BUCKET:rbpo-signature-files}
minio.region=us-east-1
minio.presigned-expiry-seconds=${MINIO_PRESIGNED_EXPIRY:3600}

# Multipart (загрузка файлов сигнатур)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Бинарный экспорт сигнатур (multipart.md): суффиксы magic MF-/DB- (фамилия или условное имя)
rbpo.binary-format.student-surname=${RBPO_BINARY_STUDENT_SURNAME:RBPO}
