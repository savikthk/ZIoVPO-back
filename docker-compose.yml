services:
  db:
    image: postgres:17-alpine
    container_name: rbpo_backend_db
    environment:
      POSTGRES_DB: rbpodb
      POSTGRES_USER: rbpo
      POSTGRES_PASSWORD: rbpo
    ports:
      - "5434:5432"
    volumes:
      - rbpo_backend_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rbpo -d rbpodb"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: rbpo_backend_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5051:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - rbpo_backend_pgadmin:/var/lib/pgadmin

